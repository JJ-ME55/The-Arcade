<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DEEPER — Shops</title>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{--crt:#6fe88a;--crt-dim:#3f9e52;--gold:#ffcf57;--txt:#e9ddc4;--muted:#9b8f76}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Oxanium',system-ui,sans-serif;color:var(--txt);background:#0a0805;min-height:100%;
    display:flex;flex-direction:column;align-items:center;gap:16px;padding:2.5vh 2vw;overflow:auto}
  #bg{position:fixed;inset:0;width:100% !important;height:100% !important;object-fit:cover;filter:blur(7px) brightness(.4) saturate(.9);z-index:0}
  .scrim{position:fixed;inset:0;z-index:1;background:radial-gradient(120% 90% at 50% 35%,transparent 25%,rgba(0,0,0,.74) 100%)}

  .tabs{position:relative;z-index:3;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .tab{display:flex;align-items:center;gap:9px;padding:10px 18px;border-radius:11px;cursor:pointer;font-family:inherit;
    font-weight:800;font-size:14px;letter-spacing:.04em;color:var(--muted);border:1.5px solid #0c0a07;
    background:linear-gradient(180deg,#2a251d,#15120b);box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
  .tab svg{width:18px;height:18px}
  .tab:hover{color:var(--txt);filter:brightness(1.1)}
  .tab.on{color:#1a1408;background:linear-gradient(180deg,#ffe487,#e0a72a);border-color:#6e4d12;box-shadow:0 3px 0 #9a6e15,0 5px 10px rgba(0,0,0,.4)}

  .stage{position:relative;z-index:2;width:min(980px,96vw)}
  .machine{display:none;position:relative;width:100%;container-type:inline-size;
    background-position:center;background-repeat:no-repeat;background-size:contain;
    filter:drop-shadow(0 24px 50px rgba(0,0,0,.65))}
  .machine.on{display:block}
  .machine[data-m="auto"]{aspect-ratio:1536/1024;background-image:url("uploads/Junk_Yard_Shop.png")}
  .machine[data-m="fuel"]{aspect-ratio:1455/1081;background-image:url("uploads/Fuel_Screen.png")}
  .machine[data-m="proc"]{aspect-ratio:1536/1024;background-image:url("uploads/mineral_processing.png")}

  .ov{position:absolute}
  .logo{font-family:'Oxanium';font-weight:800;font-style:italic;letter-spacing:.01em;transform:skewX(-7deg);display:inline-block;
    background:linear-gradient(180deg,#ffffff 0%,#cfd6df 42%,#7f8794 56%,#f0f4f8 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 1px rgba(0,0,0,.75))}
  .logo .red{background:linear-gradient(180deg,#ff8a6a,#c0341c 55%,#ff6a48);-webkit-background-clip:text;background-clip:text;color:transparent}
  .goldT{font-family:'Oxanium';font-weight:800;color:var(--gold);text-shadow:0 .2cqw 0 rgba(0,0,0,.65)}
  .goldT small{font-size:.62em;vertical-align:.14em}
  .crtT{font-family:'Share Tech Mono',monospace;color:var(--crt);text-shadow:0 0 .8cqw rgba(111,232,138,.45)}
  .dimT{color:var(--crt-dim)}

  /* sliced transparent sprites — opaque, centered, contained */
  .spim{position:absolute;inset:4%;width:92%;height:92%;object-fit:contain;filter:drop-shadow(0 .4cqw .8cqw rgba(0,0,0,.55))}

  /* ---------- AutoBuy overlays ---------- */
  .ab-lcd{left:17.2%;top:8.0%;width:24%;height:7.2%;display:grid;place-items:center;font-size:2.4cqw;letter-spacing:.22em}
  .ab-cats{left:0;top:20.1%;width:100%;height:5.5%}
  .ab-cats button{position:absolute;top:0;height:100%;width:4.6%;transform:translateX(-50%);background:none;border:none;cursor:pointer;display:grid;place-items:center;color:#101317;padding:0}
  .ab-cats svg{width:64%;height:64%;max-width:27px;stroke-width:2.6;filter:drop-shadow(0 1px 0 rgba(255,255,255,.4))}
  .ab-cats button.on{color:#0a0c0e}
  .ab-cats button.on svg{filter:drop-shadow(0 0 4px rgba(255,235,160,.9))}
  .ab-logo{left:44%;top:5.4%;width:37%;display:flex;flex-direction:column;align-items:flex-end;line-height:.8}
  .ab-logo .l1{font-size:4.3cqw}
  .ab-logo .l2{font-size:3.7cqw;margin-top:-.4cqw;background:linear-gradient(180deg,#ff8a6a,#c0341c 55%,#ff6a48);-webkit-background-clip:text;background-clip:text}
  .ab-cash{left:44%;top:19.2%;width:37%;text-align:right;font-size:3cqw}
  .ab-curlab{left:13.6%;top:35.4%;font-size:1.9cqw;letter-spacing:.12em}
  .ab-cur{left:11%;top:40.0%;width:28.4%;height:42.6%;background:#040703;border-radius:1cqw;box-shadow:inset 0 0 1.4cqw rgba(0,0,0,.95);border:.16cqw dashed rgba(111,232,138,.55)}
  .ab-cur .spim{inset:1%;width:98%;height:98%}
  .ab-curname{left:11%;top:77.2%;width:28.4%;text-align:center;font-size:1.8cqw;z-index:2;text-shadow:0 .2cqw .5cqw #000,0 0 .8cqw rgba(111,232,138,.45)}
  .ab-uplab{left:39.8%;top:35.4%;font-size:1.9cqw;letter-spacing:.12em;white-space:nowrap}
  .ucell{overflow:hidden;background:#040703;border-radius:.9cqw;box-shadow:inset 0 0 1.2cqw rgba(0,0,0,.9);border:.16cqw dashed rgba(111,232,138,.55)}
  .ucell .price{position:absolute;right:5%;bottom:3%;font-size:1.5cqw;color:var(--gold);font-family:'Share Tech Mono',monospace;text-shadow:0 .15cqw .4cqw rgba(0,0,0,.9);z-index:2}
  .u0{left:39.9%;top:40.0%;width:13.7%;height:20.4%}
  .u1{left:55.2%;top:40.0%;width:13.7%;height:20.4%}
  .u2{left:70.5%;top:40.0%;width:13.7%;height:20.4%}
  .u3{left:39.9%;top:62.2%;width:13.7%;height:20.4%}
  .u4{left:55.2%;top:62.2%;width:13.7%;height:20.4%}
  .u5{left:70.5%;top:62.2%;width:13.7%;height:20.4%}

  /* ---------- Fuel overlays ---------- */
  .fu-logo{left:5.5%;top:6%;font-size:3.5cqw}
  .fu-cash{left:56%;top:6.6%;width:28%;text-align:right;font-size:3.2cqw}
  .fu-lcd{left:12.5%;top:77%;width:15.5%;height:7.5%;display:grid;place-items:center;font-size:1.8cqw}
  /* ---- fuel gauge: proper instrument (housing / glass / liquid / tick rail) ---- */
  .fu-gauge{left:12.4%;top:24.6%;width:15%;height:50.8%}
  .fg-house{position:absolute;inset:0;border-radius:1.7cqw;display:flex;padding:1cqw;gap:.7cqw;
    background:linear-gradient(90deg,#4e4738,#665d48 16%,#332d22 88%,#241f17);
    box-shadow:inset 0 .22cqw 0 rgba(255,255,255,.2), inset 0 -.35cqw .9cqw rgba(0,0,0,.6),
      0 0 0 .2cqw #14100b, 0 .7cqw 1.6cqw rgba(0,0,0,.55)}
  .fg-house::before,.fg-house::after{content:"";position:absolute;left:50%;transform:translateX(-50%);width:62%;height:.55cqw;border-radius:.3cqw;
    background:linear-gradient(180deg,#857a60,#3e382a);box-shadow:0 .15cqw .3cqw rgba(0,0,0,.6)}
  .fg-house::before{top:-.85cqw} .fg-house::after{bottom:-.85cqw}
  .fg-slot{flex:1;position:relative;border-radius:1.1cqw;background:#0b0a07;overflow:hidden;
    box-shadow:inset 0 .35cqw 1.1cqw rgba(0,0,0,.95), inset 0 0 0 .16cqw #000}
  .fg-liq{position:absolute;left:.32cqw;right:.32cqw;bottom:.32cqw;height:40%;border-radius:.7cqw .7cqw .9cqw .9cqw;
    background:linear-gradient(90deg,#7e6a22,#ffd84d 36%,#caa42e 62%,#6e5a1c);
    box-shadow:0 0 1.8cqw rgba(255,210,80,.35), inset 0 -.5cqw .9cqw rgba(110,75,0,.5);
    transition:height .5s cubic-bezier(.22,1,.36,1), background .3s}
  .fg-liq::before{content:"";position:absolute;left:0;right:0;top:0;height:.8cqw;border-radius:50%;
    background:linear-gradient(90deg,rgba(255,255,255,.25),rgba(255,248,210,.9) 40%,rgba(255,255,255,.18))}
  .fg-liq.low{background:linear-gradient(90deg,#7e2a18,#ff6a3a 36%,#c2421e 62%,#6e2412);
    box-shadow:0 0 1.8cqw rgba(255,110,60,.4), inset 0 -.5cqw .9cqw rgba(90,20,0,.5)}
  .fg-gloss{position:absolute;top:2%;bottom:2%;left:11%;width:15%;border-radius:99cqw;pointer-events:none;
    background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.04))}
  .fg-rail{width:3cqw;position:relative;border-radius:.5cqw;
    background:linear-gradient(90deg,#4a4438,#2e2920);box-shadow:inset 0 .15cqw 0 rgba(255,255,255,.12)}
  .fg-rail .ticks{position:absolute;left:24%;right:24%;top:9%;bottom:9%;
    background:repeating-linear-gradient(180deg,rgba(232,223,184,.85) 0 .22cqw,transparent .22cqw 10.2%)}
  .fg-rail .low-zone{position:absolute;left:24%;right:24%;bottom:9%;height:18%;
    background:linear-gradient(180deg,rgba(220,70,40,0),rgba(220,70,40,.65))}
  .fg-lab{position:absolute;left:0;right:0;text-align:center;font-family:'Oxanium';font-weight:900;font-size:1.6cqw;color:#e8dfb8;text-shadow:0 .15cqw .2cqw #000}
  .fg-lab.f{top:.6cqw} .fg-lab.e{bottom:.6cqw}
  .fbtn{display:grid;place-items:center;font-family:'Oxanium';font-weight:900;color:rgba(22,8,5,.92);
    text-shadow:0 .15cqw 0 rgba(255,255,255,.14);cursor:pointer;background:none;border:none}
  .fbtn:hover{text-shadow:0 0 1cqw rgba(255,200,150,.5)}
  .f5{left:56.6%;top:26.8%;width:12.4%;height:8.2%;font-size:3.4cqw}
  .f10{left:75.9%;top:27.0%;width:12.6%;height:7.8%;font-size:3.4cqw}
  .f25{left:56.6%;top:47.1%;width:12.2%;height:7.8%;font-size:3.4cqw}
  .f50{left:75.9%;top:47.1%;width:12.6%;height:8.0%;font-size:3.4cqw}
  .ffill{left:57.6%;top:68.3%;width:30.7%;height:9.3%;font-size:3.4cqw;letter-spacing:.05em}

  /* ---------- Processor overlays ---------- */
  .pr-logo{left:14.8%;top:6.4%;font-size:3.6cqw}
  .pr-cash{left:56%;top:7.4%;width:22%;text-align:right;font-size:3.2cqw}
  .pr-table{left:17.5%;top:22.5%;width:65%;height:57%;display:flex;flex-direction:column}
  .cols4{display:grid;grid-template-columns:1fr 13% 17% 22%;align-items:center}
  .phead{color:#c2cfc4;font-family:'Oxanium';font-weight:800;font-size:1.8cqw;letter-spacing:.04em;padding-bottom:1cqw;
    border-bottom:1px solid rgba(111,232,138,.25);text-shadow:0 .15cqw .3cqw rgba(0,0,0,.7)}
  .phead span{text-align:right}
  .phead span:first-child{text-align:left}
  .srow{padding:.9cqw 0;border-bottom:1px dashed rgba(111,232,138,.16);font-size:1.85cqw;font-family:'Share Tech Mono',monospace}
  .srow>span{text-align:right}
  .ore-cell{display:flex;align-items:center;gap:1.2cqw;color:var(--crt)}
  .orecv{flex:0 0 auto;width:3.6cqw !important;height:3.6cqw !important}
  .tot{color:var(--crt);font-weight:700}
  .spacefill{flex:1}
  .sellfoot{display:grid;grid-template-columns:1fr auto 1fr;align-items:end;padding-top:1cqw}
  .sellall{grid-column:2;font-family:'Share Tech Mono',monospace;font-size:2.7cqw;color:var(--crt);background:none;border:none;cursor:pointer;
    letter-spacing:.04em;white-space:nowrap;text-shadow:0 0 1.2cqw rgba(111,232,138,.5)}
  .sellall:hover{color:#aaffba}
  .grandwrap{justify-self:end;border-top:.22cqw solid var(--crt);padding-top:.5cqw;min-width:14cqw;text-align:right}
  .grand{font-family:'Share Tech Mono',monospace;font-size:3cqw;color:var(--crt);text-shadow:0 0 1.2cqw rgba(111,232,138,.55)}
</style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="scrim"></div>

  <div class="tabs">
    <button class="tab" data-m="proc"><i data-lucide="gem"></i>Mineral Processor</button>
    <button class="tab" data-m="fuel"><i data-lucide="fuel"></i>Propellant Vendor</button>
    <button class="tab on" data-m="auto"><i data-lucide="wrench"></i>AutoBuy Upgrades</button>
  </div>

  <div class="stage">
    <!-- AutoBuy 2000 -->
    <div class="machine on" data-m="auto">
      <div class="ov ab-lcd crtT" id="catlcd">DRILL</div>
      <div class="ov ab-cats" id="abcats"></div>
      <div class="ov ab-logo"><span class="logo l1">AutoBuy</span><span class="logo l2">2000</span></div>
      <div class="ov ab-cash goldT"><small>$</small>12,450</div>
      <div class="ov ab-curlab crtT dimT">CURRENT:</div>
      <div class="ov ab-cur"><img class="spim" id="curspr" alt=""></div>
      <div class="ov ab-curname crtT" id="curname">Stock Drill</div>
      <div class="ov ab-uplab crtT dimT">AVAILABLE UPGRADES:</div>
      <div class="ov ucell u0"><img class="spim" alt=""><span class="price">$1,200</span></div>
      <div class="ov ucell u1"><img class="spim" alt=""><span class="price">$3,600</span></div>
      <div class="ov ucell u2"><img class="spim" alt=""><span class="price">$8,400</span></div>
      <div class="ov ucell u3"><img class="spim" alt=""><span class="price">$16,000</span></div>
      <div class="ov ucell u4"><img class="spim" alt=""><span class="price">$32,000</span></div>
      <div class="ov ucell u5"><img class="spim" alt=""><span class="price">$64,000</span></div>
    </div>

    <!-- Propellant Vendor 12000 -->
    <div class="machine" data-m="fuel">
      <div class="ov fu-logo logo">Propellant Vendor<span class="red"> 12000</span></div>
      <div class="ov fu-cash goldT"><small>$</small>12,450</div>
      <div class="ov fu-lcd crtT" id="flcd">4 / 10 L</div>
      <div class="ov fu-gauge">
        <div class="fg-house">
          <div class="fg-slot"><div class="fg-liq" id="tliq"></div><i class="fg-gloss"></i></div>
          <div class="fg-rail"><i class="ticks"></i><i class="low-zone"></i><span class="fg-lab f">F</span><span class="fg-lab e">E</span></div>
        </div>
      </div>
      <button class="ov fbtn f5">$5</button>
      <button class="ov fbtn f10">$10</button>
      <button class="ov fbtn f25">$25</button>
      <button class="ov fbtn f50">$50</button>
      <button class="ov fbtn ffill">FILL TANK</button>
    </div>

    <!-- Mineral Processor 3000 -->
    <div class="machine" data-m="proc">
      <div class="ov pr-logo logo">Mineral Processor<span class="red"> 3000</span></div>
      <div class="ov pr-cash goldT"><small>$</small>12,450</div>
      <div class="ov pr-table">
        <div class="phead cols4"><span>Cargo Bay</span><span>Qty.</span><span>Value</span><span>Total Value</span></div>
        <div id="sellrows"></div>
        <div class="spacefill"></div>
        <div class="sellfoot"><span></span><button class="sellall">[ SELL ALL ]</button><span class="grandwrap"><span class="grand" id="grand">$0</span></span></div>
      </div>
    </div>
  </div>

  <script src="art/deeper-core.js"></script>
  <script src="art/deeper-scene2.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
  (function(){
    try{ window.DEEPER && window.DEEPER.renderRef && window.DEEPER.renderRef(document.getElementById('bg')); }catch(e){}
    const D2=window.DEEPER;

    /* tabs */
    const tabs=[...document.querySelectorAll('.tab')], machines=[...document.querySelectorAll('.machine')];
    tabs.forEach(t=>t.addEventListener('click',()=>{
      tabs.forEach(x=>x.classList.toggle('on',x===t));
      machines.forEach(m=>m.classList.toggle('on',m.dataset.m===t.dataset.m));
    }));

    /* Mineral Processor — sell rows with our ore art */
    const ORES=[
      {key:'coal',name:'Coal',qty:14,val:12},{key:'copper',name:'Copper',qty:8,val:45},
      {key:'iron',name:'Iron',qty:12,val:30},{key:'silver',name:'Silver',qty:5,val:90},
      {key:'gold',name:'Gold',qty:3,val:320},
    ];
    let grand=0;
    document.getElementById('sellrows').innerHTML = ORES.map(o=>{
      const tot=o.qty*o.val; grand+=tot;
      return `<div class="srow cols4"><div class="ore-cell"><canvas class="orecv" data-ore="${o.key}"></canvas>${o.name}</div>
        <span class="dimT">${o.qty}&nbsp;&times;</span><span class="dimT">$${o.val}</span><span class="tot">$${tot.toLocaleString()}</span></div>`;
    }).join('');
    document.getElementById('grand').textContent='$'+grand.toLocaleString();
    if(D2&&D2.renderOreIcon)document.querySelectorAll('canvas.orecv').forEach(cv=>D2.renderOreIcon(cv,cv.dataset.ore,34));

    /* AutoBuy — category sheets (the generated sprite sheets, 3x2) */
    const CATS=[
      {key:'DRILL',   k2:'drill',   icon:'pickaxe',        cur:'Stock Drill'},
      {key:'FUEL',    k2:'fuel',    icon:'fuel',           cur:'Jerry Tank'},
      {key:'CARGO',   k2:'cargo',   icon:'package',        cur:'Ore Basket'},
      {key:'HULL',    k2:'hull',    icon:'shield',         cur:'Steel Plate'},
      {key:'ENGINE',  k2:'engine',  icon:'rocket',         cur:'Stock Block'},
      {key:'RADIATOR',k2:'radiator',icon:'thermometer-sun',cur:'Fin Stack'},
      {key:'SCANNER', k2:'scanner', icon:'radar',          cur:'Whip Antenna'},
      {key:'EXIT', icon:'log-out'}
    ];
    const abcats=document.getElementById('abcats');
    const POS=[11.2,16.8,22.3,28.0,33.4,38.7,44.4,49.8];
    abcats.innerHTML=CATS.map((c,i)=>`<button class="${i===0?'on':''}" data-i="${i}" title="${c.key}" style="left:${POS[i]}%"><i data-lucide="${c.icon}"></i></button>`).join('');
    const cells=[...document.querySelectorAll('.ucell .spim')], curspr=document.getElementById('curspr');
    function setSheet(cat){
      document.getElementById('catlcd').textContent=cat.key;
      document.getElementById('curname').textContent=cat.cur;
      curspr.src=`art/sprites/${cat.k2}_0.png`;
      cells.forEach((im,i)=>{im.src=`art/sprites/${cat.k2}_${i}.png`;});
    }
    setSheet(CATS[0]);
    abcats.addEventListener('click',e=>{
      const b=e.target.closest('button');if(!b)return;const c=CATS[+b.dataset.i];if(!c.k2)return;
      [...abcats.children].forEach(x=>x.classList.toggle('on',x===b));
      setSheet(c);
    });

    /* Propellant Vendor — functional fuel tube */
    const liq=document.getElementById('tliq'),flcd=document.getElementById('flcd');
    let L=4;const MAX=10;
    function setFuel(n){L=Math.max(0,Math.min(MAX,n));liq.style.height=(L/MAX*100)+'%';liq.classList.toggle('low',L<=2);flcd.textContent=`${L} / ${MAX} L`;}
    setFuel(4);
    document.querySelector('.f5').onclick=()=>setFuel(L+1);
    document.querySelector('.f10').onclick=()=>setFuel(L+2);
    document.querySelector('.f25').onclick=()=>setFuel(L+5);
    document.querySelector('.f50').onclick=()=>setFuel(MAX);
    document.querySelector('.ffill').onclick=()=>setFuel(MAX);

    if(window.lucide) lucide.createIcons();
  })();
  </script>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#0a0805"/>
      <rect x="16" y="22" width="68" height="56" rx="8" fill="#4a463e" stroke="#1c1813" stroke-width="2"/>
      <rect x="24" y="40" width="52" height="30" rx="4" fill="#0c2113" stroke="#0a0a08" stroke-width="2"/>
      <rect x="30" y="47" width="22" height="3" fill="#5fe87a"/>
      <rect x="30" y="55" width="34" height="3" fill="#39994a"/>
      <circle cx="78" cy="26" r="5" fill="#b23a26"/>
    </svg>
  </template>
</body>
</html>
