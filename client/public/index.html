<!DOCTYPE html>
<html lang="en" data-theme="crt">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://plugin.jup.ag https://auth.privy.io https://*.privy.io https://oauth.telegram.org https://telegram.org https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://plugin.jup.ag; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com https://privy.io https://*.privy.io https://*.privy.systems https://auth.privy.io data:; img-src 'self' data: blob: https://privy.io https://*.privy.io https://*.privy.systems https://auth.privy.io https://t.me https://telegram.org https://*.telegram.org https://explorer-api.walletconnect.com; connect-src 'self' https://api.devnet.solana.com wss://api.devnet.solana.com https://api.mainnet-beta.solana.com wss://api.mainnet-beta.solana.com https://solshot.onrender.com wss://solshot.onrender.com http://localhost:5001 ws://localhost:5001 wss://localhost:5001 https://api.jup.ag https://plugin.jup.ag https://tokens.jup.ag https://cache.jup.ag https://auth.privy.io https://*.privy.io wss://*.privy.io https://*.privy.systems wss://*.privy.systems https://*.rpc.privy.systems https://oauth.telegram.org https://telegram.org https://explorer-api.walletconnect.com https://api.web3modal.org https://pulse.walletconnect.org https://relay.walletconnect.com wss://relay.walletconnect.com https://registry.walletconnect.com; frame-src https://plugin.jup.ag https://auth.privy.io https://*.privy.io https://oauth.telegram.org https://telegram.org; object-src 'none'; base-uri 'self';" />
    <!-- suppress-wallet-errors.js removed 2026-05-04: Vercel SPA rewrite was
         intercepting the path and returning index.html, causing
         "Unexpected token '<'" syntax errors. The script was originally a
         workaround for Reown/AppKit 403s during the Dynamic era and is no
         longer needed (Privy handles its own error boundaries). -->
    <!-- telegram-web-app.js removed 2026-05-04: it shimmed window.Telegram.WebApp
         globally even in regular browsers, which caused Privy's TG login to
         take the Mini App auth path (`initLoginWithTelegram`) and crash with
         "Cannot read properties of undefined (reading 'auth')" because there's
         no real TG initData outside an actual Mini App. We dropped the Mini
         App architecture in favor of bot URL → in-app browser → solshot.gg
         PWA, so the script is no longer needed. All `window.Telegram?.WebApp`
         usages in the client are optional-chained and no-op without it. -->
    <script src="https://plugin.jup.ag/plugin-v1.js" defer></script>
    <meta name="theme-color" content="#0e1209" />
    <meta name="description" content="Browser-based 1v1 tank duels on Solana. Wager SOL, earn SHOT, climb the prestige ladder. Play in your browser or via Telegram Mini App." />
    <link rel="canonical" href="https://solshot.gg/" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, Telegram link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SolShot" />
    <meta property="og:url" content="https://solshot.gg/" />
    <meta property="og:title" content="SolShot — Artillery Duels on Solana" />
    <meta property="og:description" content="Aim. Fire. Earn. 1v1 tank battles. Wager SOL, earn SHOT, climb prestige." />
    <meta property="og:image" content="https://solshot.gg/og-preview.png" />
    <meta property="og:image:width" content="1536" />
    <meta property="og:image:height" content="1024" />
    <meta property="og:image:alt" content="SolShot — artillery duels on Solana" />

    <!-- Twitter / X large card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SolShot — Artillery Duels on Solana" />
    <meta name="twitter:description" content="Aim. Fire. Earn. 1v1 tank battles. Wager SOL, earn SHOT, climb prestige." />
    <meta name="twitter:image" content="https://solshot.gg/og-preview.png" />
    <meta name="twitter:image:alt" content="SolShot — artillery duels on Solana" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- Eruda: in-page dev console for mobile debugging. Loads only when
         the URL has ?debug=1 (or solshot_debug=1 in localStorage). On a
         Mac you'd use Safari Web Inspector via USB; without a Mac this
         gives you the same console + network + DOM tools as a floating
         widget. Tap the floating button bottom-right to open. -->
    <script>
      // Eruda mobile devtools removed pre-submission (2026-05-10) — was
      // surfacing a grey gear icon in the bottom-left for any user whose
      // localStorage had a stale `solshot_debug=1` flag (set once via
      // ?debug=1 and never cleared). Belt-and-brace: if any user still
      // has that flag, also clear it so DebugAuthOverlay (which uses a
      // separate `solshotDebug` camelCase key) is unaffected.
      try {
        if (window.localStorage) localStorage.removeItem('solshot_debug');
      } catch (e) { /* ignore — never break prod */ }
    </script>
    <!-- iOS PWA / fullscreen launch:
           apple-mobile-web-app-capable=yes — when launched from Home Screen,
             iOS strips the URL bar + tab strip + nav arrows entirely. Without
             this, even with manifest display:standalone, iOS keeps Safari
             chrome and the game viewport loses ~25% on iPhone landscape.
           apple-mobile-web-app-status-bar-style=black-translucent — overlay
             status bar on top of our dark UI instead of reserving space.
           apple-mobile-web-app-title — Home-screen icon label. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SolShot" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>SolShot</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
    </div>
  </body>
</html>
