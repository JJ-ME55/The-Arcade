<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Side Pocket 3D — scaffold</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0e0c; overflow: hidden;
    font-family: system-ui, sans-serif; }
  #c { display: block; width: 100vw; height: 100vh; }
  #hint { position: fixed; left: 12px; bottom: 12px; color: #9aa; font-size: 13px;
    letter-spacing: .02em; text-shadow: 0 1px 2px #000; }
  #title { position: fixed; left: 12px; top: 12px; color: #f4ecdb; font-size: 15px;
    font-weight: 600; text-shadow: 0 1px 2px #000; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">Side Pocket — 3D scaffold (phase 1c · box rails)</div>
<div id="hint">drag to orbit · scroll to zoom</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* SIDE POCKET 3D — scaffold phase 1c.
   Rebuilt from axis-aligned BOXES only (the rotated ExtrudeGeometry in
   1b mis-oriented every rail). Geometry mirrors pool/src/game.config.ts.
   Mapping: sim 1500×825 px plane, centred at origin, scaled 1/100.    */

const GAME = { x: 1500, y: 825 };
const cushionWidth = 78, feltInset = 48, chamfer = 30, pocketR = 34;
const POCKETS = [
  { x: 62, y: 62 }, { x: 750, y: 56 }, { x: 1438, y: 62 },
  { x: 62, y: 763 }, { x: 750, y: 769 }, { x: 1438, y: 763 },
];
const BALL_D = 38;
const CUE = { x: 413, y: 413 };
const EIGHT = { x: 1090, y: 413 };
const SOLID_POS = [
  { x: 1056, y: 433 }, { x: 1090, y: 374 }, { x: 1126, y: 393 }, { x: 1126, y: 472 },
  { x: 1162, y: 335 }, { x: 1162, y: 374 }, { x: 1162, y: 452 },
];
const STRIPE_POS = [
  { x: 1022, y: 413 }, { x: 1056, y: 393 }, { x: 1090, y: 452 }, { x: 1126, y: 354 },
  { x: 1126, y: 433 }, { x: 1162, y: 413 }, { x: 1162, y: 491 },
];
const PALETTE = ['#F4B924','#1F5BB3','#C6312A','#5B2680','#E2691C','#1E7A3A','#6E2618'];

const S = 1 / 100;
const R = (BALL_D / 2) * S;
const wx = (sx) => (sx - GAME.x / 2) * S;
const wz = (sy) => (sy - GAME.y / 2) * S;

// —— renderer / scene / camera ——
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#0b0e0c');

// Studio environment for realistic PBR reflections on the balls + brass
// (no external HDRI asset needed — RoomEnvironment is procedural).
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 10.5, 9.5);

const controls = new OrbitControls(camera, canvas);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.maxPolarAngle = Math.PI * 0.49;

// —— lighting ——
scene.add(new THREE.HemisphereLight(0xbfd4ff, 0x14140e, 0.5));
const key = new THREE.DirectionalLight(0xfff2dc, 2.3);
key.position.set(-6, 15, 5);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 1; key.shadow.camera.far = 60;
key.shadow.camera.left = -14; key.shadow.camera.right = 14;
key.shadow.camera.top = 9; key.shadow.camera.bottom = -9;
key.shadow.bias = -0.0004;
scene.add(key);

// —— materials ——
const woodMat = new THREE.MeshStandardMaterial({ color: '#5a1a14', roughness: 0.45, metalness: 0.08 });
const feltMat = new THREE.MeshStandardMaterial({ color: '#1E5FA8', roughness: 0.98, side: THREE.DoubleSide });
const cushMat = new THREE.MeshStandardMaterial({ color: '#1a5292', roughness: 0.9 });
const holeMat = new THREE.MeshStandardMaterial({ color: '#040507', roughness: 1, side: THREE.DoubleSide });
const brassMat = new THREE.MeshStandardMaterial({ color: '#caa24a', roughness: 0.35, metalness: 0.7 });

// —— wood body (visible border + sides) ——
const body = new THREE.Mesh(new THREE.BoxGeometry(GAME.x * S + 0.9, 0.7, GAME.y * S + 0.9), woodMat);
body.position.y = -0.34; body.receiveShadow = true; scene.add(body);

// —— felt: flat bed, inner of the wood border (feltInset inset), top flush ——
const feltW = (GAME.x - 2 * feltInset) * S;
const feltH = (GAME.y - 2 * feltInset) * S;
const felt = new THREE.Mesh(new THREE.BoxGeometry(feltW, 0.04, feltH), feltMat);
felt.position.y = 0.0; felt.receiveShadow = true; scene.add(felt);   // top at +0.02

// —— pocket mouths (mirror railMouths in sim/world.ts) ——
function mouthsOnRail(rail) {
  const out = [];
  for (const p of POCKETS) {
    let onRail = false, seam = 0, perp = 0, along = 0;
    if (rail === 'top')    { onRail = p.y <= cushionWidth;          seam = feltInset;          perp = p.y; along = p.x; }
    if (rail === 'bottom') { onRail = p.y >= GAME.y - cushionWidth; seam = GAME.y - feltInset; perp = p.y; along = p.x; }
    if (rail === 'left')   { onRail = p.x <= cushionWidth;          seam = feltInset;          perp = p.x; along = p.y; }
    if (rail === 'right')  { onRail = p.x >= GAME.x - cushionWidth; seam = GAME.x - feltInset; perp = p.x; along = p.y; }
    if (!onRail) continue;
    const d = seam - perp;
    const chord = Math.sqrt(Math.max(0, pocketR * pocketR - d * d));
    const half = chord + chamfer;
    out.push([along - half, along + half]);
  }
  out.sort((a, b) => a[0] - b[0]);
  return out;
}

// —— cushion segment: plain axis-aligned box, butted against the rail ——
const CUSH_H = 0.32;
const stripMidTop = (feltInset + cushionWidth) / 2;                 // 63 (top/left)
const stripMidBot = (GAME.y - cushionWidth + GAME.y - feltInset) / 2; // 762 (bottom)
const stripMidRgt = (GAME.x - cushionWidth + GAME.x - feltInset) / 2; // 1452-ish (right)
const stripDepth = (cushionWidth - feltInset) * S;                 // 30px
function addCushion(rail, a, b) {
  const len = (b - a) * S;
  if (len <= 0.001) return;
  let w, d, cx, cz;
  if (rail === 'top')    { w = len; d = stripDepth; cx = wx((a + b) / 2); cz = wz(stripMidTop); }
  if (rail === 'bottom') { w = len; d = stripDepth; cx = wx((a + b) / 2); cz = wz(stripMidBot); }
  if (rail === 'left')   { w = stripDepth; d = len; cx = wx(stripMidTop); cz = wz((a + b) / 2); }
  if (rail === 'right')  { w = stripDepth; d = len; cx = wx(stripMidRgt); cz = wz((a + b) / 2); }
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, CUSH_H, d), cushMat);
  m.position.set(cx, CUSH_H / 2, cz);
  m.castShadow = true; m.receiveShadow = true; scene.add(m);
}
for (const rail of ['top', 'bottom', 'left', 'right']) {
  const mouths = mouthsOnRail(rail);
  for (let i = 0; i < mouths.length - 1; i++) addCushion(rail, mouths[i][1], mouths[i + 1][0]);
}

// —— pockets: dark mouth disc (reads as the hole) + recessed cup + brass rim ——
for (const p of POCKETS) {
  const isCorner = (p.x < 200 || p.x > GAME.x - 200);
  const rr = pocketR * S * (isCorner ? 1.18 : 1.04);
  const x = wx(p.x), z = wz(p.y);
  // flat dark disc just above the felt — the visible hole mouth
  const disc = new THREE.Mesh(new THREE.CircleGeometry(rr, 32), holeMat);
  disc.rotation.x = -Math.PI / 2; disc.position.set(x, 0.03, z); scene.add(disc);
  // recessed cup below (depth when viewed at an angle)
  const cup = new THREE.Mesh(new THREE.CylinderGeometry(rr, rr * 0.7, 0.7, 28, 1, true), holeMat);
  cup.position.set(x, -0.33, z); scene.add(cup);
  // brass rim ring at the felt line
  const rim = new THREE.Mesh(new THREE.TorusGeometry(rr, 0.026, 10, 32), brassMat);
  rim.rotation.x = Math.PI / 2; rim.position.set(x, 0.035, z); rim.castShadow = true; scene.add(rim);
}

// —— balls ——
const ballGeo = new THREE.SphereGeometry(R, 48, 48);
function addBall(pos, color) {
  const m = new THREE.Mesh(
    ballGeo,
    new THREE.MeshPhysicalMaterial({ color, roughness: 0.16, clearcoat: 1, clearcoatRoughness: 0.04, metalness: 0 })
  );
  m.position.set(wx(pos.x), R, wz(pos.y));
  m.castShadow = true; m.receiveShadow = true; scene.add(m);
}
addBall(CUE, '#FAF6E4');
addBall(EIGHT, '#0E0E10');
SOLID_POS.forEach((p, i) => addBall(p, PALETTE[i]));
STRIPE_POS.forEach((p, i) => addBall(p, PALETTE[i]));

// —— loop ——
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
(function tick() {
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
