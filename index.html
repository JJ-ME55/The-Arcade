<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#060403" />
    <meta name="description" content="DEEPER — dig deep, get rich, don't get stranded. A high-score mining descent." />
    <title>DEEPER</title>
    <!-- DesignHandoff type: Oxanium (display/UI) + Share Tech Mono (numeric readouts). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        /* themed cavern backdrop so the portrait game reads as a framed screen on
           wide desktop monitors instead of a bare phone strip on black */
        background:
          radial-gradient(ellipse 70% 55% at 50% 28%, #241c12 0%, #120d08 50%, #07050300 78%, #040302 100%);
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }
      #game {
        position: fixed;
        inset: 0;
        /* let Phaser's CENTER_BOTH handle canvas centering (don't double-center) */
      }
      canvas {
        touch-action: none;
        display: block;
      }
      #boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 35%, #1c160e 0%, #060403 70%);
        color: #ffcf4d;
        font-weight: 700;
        letter-spacing: 0.35em;
        z-index: 10;
        transition: opacity 0.4s ease;
      }
      #boot-loader .title {
        font-family: 'Oxanium', 'Segoe UI', system-ui, sans-serif;
        font-weight: 800;
        letter-spacing: 0.13em;
        font-size: clamp(28px, 8vw, 64px);
        text-shadow: 0 0 24px rgba(255, 207, 77, 0.5);
      }
      #boot-loader .sub {
        margin-top: 12px;
        font-size: 12px;
        letter-spacing: 0.3em;
        color: #6b6256;
      }
      #boot-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="boot-loader">
      <div class="title">DEEPER</div>
      <div class="sub">LOADING THE DESCENT…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
