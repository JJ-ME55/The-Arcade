<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/assets/brand/arcade-logo-blue.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FBFCFE" />
    <meta name="color-scheme" content="light only" />
    <title>The Arcade — Play. Wager. Win. On Solana.</title>
    <meta name="description" content="A games-first arcade on Solana rails. Cabinets, wagers, tickets, and prizes — all on-chain, all paper-light." />
    <link rel="canonical" href="https://the-arcade-eta.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="The Arcade" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://the-arcade-eta.vercel.app/" />
    <meta property="og:title" content="The Arcade — Play. Wager. Win. On Solana." />
    <meta property="og:description" content="A games-first arcade on Solana rails. Cabinets, wagers, tickets, and prizes — all on-chain, all paper-light." />
    <meta property="og:image" content="https://the-arcade-eta.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Arcade — Play. Wager. Win. On Solana." />
    <meta name="twitter:description" content="A games-first arcade on Solana rails." />
    <meta name="twitter:image" content="https://the-arcade-eta.vercel.app/og-image.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />

    <!-- Structured data: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "The Arcade",
        "url": "https://the-arcade-eta.vercel.app/",
        "description": "A Solana-native skill arcade. Multi-game hub with leaderboards, wagering, and prizes.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://the-arcade-eta.vercel.app/play?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Brand fonts — Krona One (display), DM Sans (body), IBM Plex Mono (mono).
         Per design handoff 2026-05-28. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Krona+One&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
