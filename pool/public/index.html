<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Side Pocket — The Arcade</title>
    <link rel="shortcut icon" type="image/png" href="assets/sprites/favicon.png"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameArea">
        <canvas id="screen"></canvas>
    </div>
    <div id="powerHud" aria-hidden="true">
        <span id="powerHudLabel">POWER</span>
        <input type="range" id="powerSlider" min="0" max="50" value="0" step="1" aria-label="Shot power">
    </div>
    <div id="spinHud" aria-hidden="true">
        <span id="spinHudLabel">SPIN</span>
        <div id="spinPad" role="application" aria-label="Cue ball impact point">
            <div id="spinDot"></div>
        </div>
    </div>
    <script>
        // Side Pocket Phase B — when the hub's MatchHUD wraps this iframe
        // (?hud=parent), hide the in-iframe DOM widgets (power slider +
        // spin pad) and tell the canvas not to draw the in-canvas "PLAYER 1"
        // and "00" labels — the parent React HUD takes over for player
        // cards, scores, timer, room name, power, shoot, spin. Game.ts /
        // game-world.ts read `window.__SIDE_POCKET_PARENT_HUD` to suppress
        // those draws.
        (function(){
            var params = new URLSearchParams(location.search);
            if (params.get('hud') === 'parent') {
                window.__SIDE_POCKET_PARENT_HUD = true;
                // Hide the iframe's DOM controls — React MatchHUD owns
                // the chrome. Inject CSS before stylesheet load so the
                // widgets never flash visible.
                var s = document.createElement('style');
                s.textContent = '#powerHud,#spinHud{display:none !important;}';
                document.head.appendChild(s);

                // STUB-BUFFER for the React→iframe globals. game.init()
                // takes 5-15 seconds to load assets; if React clicks
                // SHOOT before init completes, the global is undefined
                // and the click is a no-op (JJ 2026-06: "I cannot click
                // the shoot button to get functionality?"). Solution:
                // install stubs immediately that BUFFER calls. game.ts
                // replays them after init completes.
                window.__SIDE_POCKET_BUFFER = [];
                window.__SIDE_POCKET_FORCE_SHOOT = function(){
                    window.__SIDE_POCKET_BUFFER.push(['shoot']);
                };
                window.__SIDE_POCKET_SET_POWER = function(pct){
                    window.__SIDE_POCKET_BUFFER.push(['power', pct]);
                };
                window.__SIDE_POCKET_SET_SPIN = function(x, y){
                    window.__SIDE_POCKET_BUFFER.push(['spin', x, y]);
                };
                window.__SIDE_POCKET_TIMEOUT = function(){
                    window.__SIDE_POCKET_BUFFER.push(['timeout']);
                };
            }
        })();
    </script>
    <script src="bundle.js"></script>
</body>
</html>
